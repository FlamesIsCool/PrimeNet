<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse all TV shows on PrimeNet — Drama, Comedy, Thriller, Fantasy and more.">
  <title>TV Shows — PrimeNet</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📺</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="tv">

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar" id="navbar">
    <a href="index.html" class="navbar-brand">
      <span class="navbar-logo">Prime<span>Net</span></span>
    </a>
    <div class="navbar-nav">
      <a href="index.html" class="nav-link">Home</a>
      <a href="movies.html" class="nav-link">Movies</a>
      <a href="tv.html" class="nav-link active">TV Shows</a>
      <a href="search.html" class="nav-link">Search</a>
    </div>
    <div class="navbar-right">
      <div class="search-container">
        <button class="search-toggle" id="searchToggle" aria-label="Search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        <div class="search-box" id="searchBox">
          <input type="text" class="search-input" id="navSearchInput" placeholder="Search movies, shows..." autocomplete="off">
          <button class="search-btn" id="navSearchBtn" aria-label="Search">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- ===== BROWSE PAGE ===== -->
  <div class="browse-page">
    <div class="browse-header">
      <h1 class="browse-title">📺 TV Shows</h1>
      <p class="browse-subtitle">Discover the best TV series from around the world.</p>
    </div>

    <!-- Genre Filter -->
    <div class="genre-filter" id="genreFilter"></div>

    <!-- Controls -->
    <div class="browse-controls">
      <select class="select-filter" id="sortSelect" aria-label="Sort by">
        <option value="popularity.desc">Most Popular</option>
        <option value="vote_average.desc">Top Rated</option>
        <option value="first_air_date.desc">Newest</option>
        <option value="vote_count.desc">Most Voted</option>
      </select>
    </div>

    <!-- Content Grid -->
    <div class="content-grid" id="contentGrid"></div>

    <!-- Load More -->
    <div class="load-more-wrap" id="loadMoreWrap">
      <button class="btn-load-more" id="loadMoreBtn">Load More</button>
    </div>
  </div>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <div class="footer-bottom">
      <p class="footer-copy">© 2025 PrimeNet. Content data provided by <a href="https://www.themoviedb.org" target="_blank" rel="noopener" style="color:#888">TMDB</a>.</p>
      <div class="footer-links">
        <a href="index.html">Home</a>
        <a href="movies.html">Movies</a>
        <a href="tv.html">TV Shows</a>
        <a href="search.html">Search</a>
      </div>
    </div>
  </footer>

  <!-- ===== MODAL ===== -->
  <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true">
    <div class="modal">
      <button class="modal-close" id="modalClose" aria-label="Close">✕</button>
      <div class="modal-backdrop">
        <img id="modalBackdropImg" src="" alt="">
      </div>
      <div class="modal-content">
        <h2 class="modal-title" id="modalTitle"></h2>
        <div class="modal-meta" id="modalMeta"></div>
        <p class="modal-overview" id="modalOverview"></p>
        <div class="modal-actions">
          <button class="btn-primary" id="modalWatchBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            Watch Now
          </button>
        </div>
        <div class="modal-info-grid" id="modalInfoGrid"></div>
      </div>
    </div>
  </div>

  <!-- ===== BACK TO TOP ===== -->
  <button class="back-to-top" aria-label="Back to top">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
  </button>

  <!-- ===== SCRIPTS ===== -->
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/browse.js"></script>
</body>
</html>
